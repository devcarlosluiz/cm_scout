{% load i18n static %}
<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar · ScoutBet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' },
                        surface: { 900: '#0f172a', 800: '#1e293b' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-surface-900 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-1">
            <div class="flex justify-center">
                <img src="{% static 'img/logo.png' %}" alt="ScoutBet" class="w-auto h-auto object-contain drop-shadow-[0_0_24px_rgba(99,102,241,0.55)]">
            </div>
        </div>

        <!-- Card -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8">
            <h2 class="text-xl font-bold text-white mb-6">Entrar na conta</h2>

            {% if form.errors %}
            <div class="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-sm">
                E-mail ou senha incorretos. Tente novamente.
            </div>
            {% endif %}

            <form method="post" action="{% url 'account_login' %}">
                {% csrf_token %}
                {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
                {% endif %}

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1.5">E-mail</label>
                        <input type="email" name="login" value="{{ form.login.value|default:'' }}" required autofocus
                            placeholder="seu@email.com"
                            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-600
                                   text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="text-sm text-slate-400">Senha</label>
                            <a href="{% url 'account_reset_password' %}" class="text-xs text-brand-400 hover:text-brand-300 transition-colors">
                                Esqueceu?
                            </a>
                        </div>
                        <input type="password" name="password" required
                            placeholder="••••••••"
                            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-600
                                   text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" name="remember" id="remember" class="w-4 h-4 accent-brand-500">
                        <label for="remember" class="text-sm text-slate-400">Lembrar de mim</label>
                    </div>
                </div>

                <button type="submit"
                    class="w-full mt-6 py-3 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-xl transition-colors">
                    Entrar
                </button>
            </form>

            <p class="text-center text-sm text-slate-600 mt-6">
                Não tem conta?
                <a href="{% url 'account_signup' %}" class="text-brand-400 hover:text-brand-300 transition-colors">
                    Criar conta
                </a>
            </p>
        </div>
    </div>

</body>
</html>
