{% extends 'base.html' %}

{% block title %}Excluir Alerta{% endblock %}
{% block page_title %}Excluir Alerta{% endblock %}

{% block content %}
<div class="max-w-md">
    <div class="bg-surface-900 border border-red-900/30 rounded-xl p-6">
        <div class="flex items-start gap-4">
            <div class="w-10 h-10 bg-red-500/15 rounded-xl flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <div>
                <h3 class="font-semibold text-white">Confirmar exclusão</h3>
                <p class="text-sm text-slate-400 mt-1">
                    Tem certeza que deseja excluir o alerta <strong class="text-white">{{ alert.name }}</strong>?
                    Esta ação não pode ser desfeita.
                </p>
            </div>
        </div>
        <form method="post" class="flex gap-3 mt-6">
            {% csrf_token %}
            <button type="submit"
                class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-lg transition-colors">
                Excluir
            </button>
            <a href="{% url 'alerts:list' %}"
                class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-400 text-sm rounded-lg transition-colors">
                Cancelar
            </a>
        </form>
    </div>
</div>
{% endblock %}
