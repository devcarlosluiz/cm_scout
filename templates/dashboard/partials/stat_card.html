<!-- Stat Card Component -->
<div class="bg-surface-900 border border-slate-800 rounded-xl p-5 hover:border-slate-700 transition-colors">
    <div class="flex items-start justify-between">
        <div>
            <p class="text-xs font-medium text-slate-500 uppercase tracking-wider">{{ title }}</p>
            <p class="text-3xl font-bold text-white mt-1">{{ value|default:"0" }}</p>
        </div>
        <div class="w-10 h-10 rounded-xl flex items-center justify-center
            {% if color == 'brand' %}bg-brand-500/15 text-brand-400
            {% elif color == 'violet' %}bg-violet-500/15 text-violet-400
            {% elif color == 'sky' %}bg-sky-500/15 text-sky-400
            {% elif color == 'amber' %}bg-amber-500/15 text-amber-400
            {% elif color == 'emerald' %}bg-emerald-500/15 text-emerald-400
            {% else %}bg-slate-700 text-slate-400{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                {% if icon == 'calendar-today' %}
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                {% elif icon == 'calendar-next' %}
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
                {% elif icon == 'calendar-week' %}
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                {% elif icon == 'fire' %}
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/>
                {% elif icon == 'chart' %}
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                {% endif %}
            </svg>
        </div>
    </div>
</div>
