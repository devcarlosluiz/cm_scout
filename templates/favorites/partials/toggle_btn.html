{% load core_tags %}
<!-- Inline favorite toggle button -->
<button
    id="favorite-btn"
    hx-post="{% url 'favorites:toggle' fixture.pk %}"
    hx-trigger="click"
    hx-swap="outerHTML"
    class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-xs font-medium transition-colors cursor-pointer
        {% if is_favorite %}bg-amber-500/10 text-amber-400 border-amber-500/20 hover:bg-amber-500/20
        {% else %}bg-slate-800 text-slate-500 border-slate-700 hover:text-amber-400 hover:border-amber-500/20{% endif %}">
    <svg class="w-3.5 h-3.5" fill="{% if is_favorite %}currentColor{% else %}none{% endif %}" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
    </svg>
    {% if is_favorite %}Salvo{% else %}Salvar{% endif %}
</button>
