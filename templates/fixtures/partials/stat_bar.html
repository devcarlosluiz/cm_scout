<!-- Comparative stat bar -->
{% load core_tags %}
<div>
    <div class="flex items-center justify-between text-xs mb-1.5">
        <span class="font-mono text-brand-400 font-semibold">{{ home }}</span>
        <span class="text-slate-500">{{ label }}</span>
        <span class="font-mono text-violet-400 font-semibold">{{ away }}</span>
    </div>
    <div class="flex h-1.5 rounded-full overflow-hidden bg-slate-800">
        {% with total=home|add:away %}
        {% if total > 0 %}
        <div class="bg-brand-500 transition-all duration-500"
            style="width: {% widthratio home total 100 %}%">
        </div>
        <div class="bg-violet-500 flex-1 transition-all duration-500"></div>
        {% else %}
        <div class="bg-slate-700 w-full"></div>
        {% endif %}
        {% endwith %}
    </div>
</div>
