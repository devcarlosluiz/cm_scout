{% load static %}
<!-- Top Navbar -->
<header class="sticky top-0 z-40 bg-surface-900/80 backdrop-blur-md border-b border-slate-800 px-6 py-3 flex items-center justify-between gap-4">

    <!-- Left: Mobile toggle + Page title -->
    <div class="flex items-center gap-4">
        <button id="sidebar-toggle" class="lg:hidden p-2 rounded-lg hover:bg-slate-800 transition-colors text-slate-400">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <div>
            <h1 class="text-lg font-semibold text-white">{% block page_title %}Dashboard{% endblock %}</h1>
            <p class="text-xs text-slate-500">{% block page_subtitle %}{% endblock %}</p>
        </div>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-3">

        <!-- Live indicator -->
        <div class="flex items-center gap-2 px-3 py-1.5 bg-green-500/10 border border-green-500/20 rounded-full text-xs text-green-400">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
            <span class="hidden sm:block">Dados ao Vivo</span>
        </div>

        <!-- Alerts bell -->
        <a href="{% url 'alerts:list' %}"
            class="relative p-2 rounded-lg hover:bg-slate-800 transition-colors text-slate-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
        </a>

        <!-- Theme toggle -->
        <button id="theme-toggle" onclick="toggleTheme()"
            class="p-2 rounded-lg hover:bg-slate-800 transition-colors text-slate-400 hover:text-white"
            title="Alternar tema">
            <!-- Sun (light mode icon) -->
            <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <!-- Moon (dark mode icon) -->
            <svg id="icon-moon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
        </button>

        <!-- Favorites -->
        <a href="{% url 'favorites:list' %}"
            class="p-2 rounded-lg hover:bg-slate-800 transition-colors text-slate-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
            </svg>
        </a>

        <!-- User dropdown -->
        {% if user.is_authenticated %}
        <div class="relative" x-data="{ open: false }" @click.away="open = false">
            <button @click="open = !open"
                class="flex items-center gap-2 p-1 rounded-lg hover:bg-slate-800 transition-colors">
                <img src="{{ user.avatar_url }}" alt="{{ user.username }}"
                    class="w-8 h-8 rounded-full ring-2 ring-brand-500/30">
                <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            <div x-show="open" x-transition
                class="absolute right-0 top-12 w-56 bg-surface-800 border border-slate-700 rounded-xl shadow-2xl z-50 overflow-hidden">

                <!-- User info -->
                <div class="px-4 py-3 border-b border-slate-700/60 bg-slate-800/50">
                    <p class="text-sm font-semibold text-white truncate">{{ user.full_name }}</p>
                    <p class="text-xs text-slate-500 truncate mt-0.5">{{ user.email }}</p>
                </div>

                <!-- Menu items -->
                <div class="py-1">
                    <a href="{% url 'accounts:profile' %}"
                        style="display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:0.875rem;color:#cbd5e1;text-decoration:none;transition:background 0.15s"
                        onmouseover="this.style.background='#1e293b';this.style.color='#fff'"
                        onmouseout="this.style.background='transparent';this.style.color='#cbd5e1'">
                        <svg style="width:16px;height:16px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        Meu Perfil
                    </a>
                    <a href="{% url 'alerts:list' %}"
                        style="display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:0.875rem;color:#cbd5e1;text-decoration:none;transition:background 0.15s"
                        onmouseover="this.style.background='#1e293b';this.style.color='#fff'"
                        onmouseout="this.style.background='transparent';this.style.color='#cbd5e1'">
                        <svg style="width:16px;height:16px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        Alertas
                    </a>
                    {% if user.is_staff %}
                    <a href="{% url 'admin:index' %}"
                        style="display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:0.875rem;color:#cbd5e1;text-decoration:none;transition:background 0.15s"
                        onmouseover="this.style.background='#1e293b';this.style.color='#fff'"
                        onmouseout="this.style.background='transparent';this.style.color='#cbd5e1'">
                        <svg style="width:16px;height:16px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        Administração
                    </a>
                    {% endif %}
                </div>

                <!-- Sair -->
                <div style="border-top:1px solid rgba(51,65,85,0.6);padding:4px 0">
                    <a href="{% url 'account_logout' %}"
                        style="display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:0.875rem;color:#f87171;text-decoration:none;transition:background 0.15s"
                        onmouseover="this.style.background='rgba(239,68,68,0.08)';this.style.color='#fca5a5'"
                        onmouseout="this.style.background='transparent';this.style.color='#f87171'">
                        <svg style="width:16px;height:16px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Sair
                    </a>
                </div>
            </div>
        </div>
        {% else %}
        <a href="{% url 'account_login' %}"
            class="px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium rounded-lg transition-colors">
            Entrar
        </a>
        {% endif %}
    </div>
</header>

<!-- Alpine.js for dropdown -->
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
