{% load static %}
<!-- Sidebar Navigation -->
<aside id="sidebar"
    class="fixed top-0 left-0 h-full w-64 bg-surface-900 border-r border-slate-800 flex flex-col z-50 transition-transform duration-300">

    <!-- Logo -->
    <div class="flex items-center justify-center px-3 py-3 border-b border-slate-800">
        <a href="{% url 'dashboard:index' %}" class="w-full">
            <img src="{% static 'img/logo.png' %}" alt="CM Scout" class="w-full h-auto object-contain">
        </a>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">

        <!-- Main -->
        <p class="text-xs font-semibold text-slate-600 uppercase tracking-wider px-2 mb-2 mt-1">Principal</p>

        <a href="{% url 'dashboard:index' %}"
            class="nav-link {% if request.resolver_match.namespace == 'dashboard' %}nav-active{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Dashboard
        </a>

        <a href="{% url 'fixtures:list' %}"
            class="nav-link {% if request.resolver_match.namespace == 'fixtures' %}nav-active{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Partidas
        </a>

        <a href="{% url 'leagues:list' %}"
            class="nav-link {% if request.resolver_match.namespace == 'leagues' %}nav-active{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
            </svg>
            Ligas
        </a>

        <!-- Analysis -->
        <p class="text-xs font-semibold text-slate-600 uppercase tracking-wider px-2 mb-2 mt-4">Análise</p>

        <a href="{% url 'analysis:index' %}"
            class="nav-link {% if request.resolver_match.namespace == 'analysis' %}nav-active{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Oportunidades
        </a>

        <a href="{% url 'reports:index' %}"
            class="nav-link {% if request.resolver_match.namespace == 'reports' %}nav-active{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Relatórios
        </a>

        <!-- Personal -->
        <p class="text-xs font-semibold text-slate-600 uppercase tracking-wider px-2 mb-2 mt-4">Pessoal</p>

        <a href="{% url 'favorites:list' %}"
            class="nav-link {% if request.resolver_match.namespace == 'favorites' %}nav-active{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
            </svg>
            Favoritos
        </a>

        <a href="{% url 'alerts:list' %}"
            class="nav-link {% if request.resolver_match.namespace == 'alerts' %}nav-active{% endif %}">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            Alertas
        </a>
    </nav>

    <!-- User section -->
    {% if user.is_authenticated %}
    <div class="border-t border-slate-800 p-3">
        <a href="{% url 'accounts:profile' %}"
            class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors group">
            <img src="{{ user.avatar_url }}" alt="{{ user.username }}"
                class="w-8 h-8 rounded-full ring-2 ring-brand-500/30">
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-white truncate">{{ user.full_name }}</p>
                <p class="text-xs text-slate-500 truncate">{{ user.email }}</p>
            </div>
            <svg class="w-4 h-4 text-slate-600 group-hover:text-slate-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
        </a>
    </div>
    {% endif %}
</aside>

<style>
    .nav-link {
        @apply flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all duration-150 text-sm font-medium;
    }
    .nav-active {
        @apply bg-brand-500/10 text-brand-400 border border-brand-500/20 !important;
    }
</style>
